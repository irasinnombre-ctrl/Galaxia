<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Nicole 💛 Universo de Amor</title>
  <style>
    body { margin: 0; overflow: hidden; background: radial-gradient(circle, #000000, #020200); }
    canvas { display: block; }
    #mensaje {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      color: #FFD700;
      font-family: Arial, sans-serif;
      font-size: 30px;
      text-shadow: 0 0 25px #FFD700;
    }
  </style>
</head>
<body>
<div id="mensaje">Nicole, todo este universo habla de vos 💛</div>

<audio id="musica" loop>
  <source src="cancion.mp4" type="audio/mp4">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.z = 120;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// FRASES
const frases = [
  "Te amo Nicole",
  "Flores amarillas para vos",
  "Eres mi universo",
  "Siempre vos",
  "Mi lugar favorito",
  "Amor infinito",
  "Sos mi sol",
  "Todo es mejor con vos",
  "Nicole 💛",
  "Para siempre",
  "Eres luz",
  "Mi galaxia",
  "Amarte es mi destino"
];

function crearTextoSprite(texto) {
  const canvas = document.createElement('canvas');
  const context = canvas.getContext('2d');
  canvas.width = 512;
  canvas.height = 256;

  context.fillStyle = 'rgba(0,0,0,0)';
  context.fillRect(0,0,canvas.width,canvas.height);

  context.font = '40px Arial';
  context.fillStyle = '#FFD700';
  context.textAlign = 'center';
  context.fillText(texto, canvas.width/2, canvas.height/2);

  const texture = new THREE.CanvasTexture(canvas);
  const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
  const sprite = new THREE.Sprite(material);

  return sprite;
}

// CREAR GALAXIA DE TEXTO
const grupo = new THREE.Group();

const cantidad = 1200;
for (let i = 0; i < cantidad; i++) {
  const radio = Math.random() * 90;
  const angulo = radio * 0.3;

  const x = Math.cos(angulo) * radio + (Math.random() - 0.5) * 5;
  const y = (Math.random() - 0.5) * 5;
  const z = Math.sin(angulo) * radio + (Math.random() - 0.5) * 5;

  const frase = frases[Math.floor(Math.random() * frases.length)];
  const texto = crearTextoSprite(frase);

  const escala = 2 + Math.random() * 4;
  texto.scale.set(escala * 2, escala, 1);

  texto.position.set(x, y, z);
  grupo.add(texto);
}

scene.add(grupo);

// ESTRELLAS DE FONDO
const estrellasGeo = new THREE.BufferGeometry();
const estrellasCant = 2000;
const estrellasPos = [];

for (let i = 0; i < estrellasCant; i++) {
  estrellasPos.push((Math.random() - 0.5) * 2000);
  estrellasPos.push((Math.random() - 0.5) * 2000);
  estrellasPos.push((Math.random() - 0.5) * 2000);
}

estrellasGeo.setAttribute('position', new THREE.Float32BufferAttribute(estrellasPos, 3));

const estrellasMat = new THREE.PointsMaterial({ color: 0x888866, size: 1 });
const estrellas = new THREE.Points(estrellasGeo, estrellasMat);
scene.add(estrellas);

// ANIMACIÓN
function animate() {
  requestAnimationFrame(animate);

  grupo.rotation.y += 0.0015;

  controls.update();
  renderer.render(scene, camera);
}

animate();

// RESPONSIVE
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

let player;

function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    height: '0',
    width: '0',
    videoId: 'vGJTaP6anOU',
    playerVars: {
      autoplay: 0,
      loop: 1,
      playlist: 'vGJTaP6anOU',
      controls: 0,
      playsinline: 1
    }
  });
}

const musica = document.getElementById("musica");

document.addEventListener("click", () => {
  musica.play();
}, { once: true });

</script>
</body>
</html>
